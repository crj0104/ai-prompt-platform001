spring.application.name=ai-prompt-template-platform

server.port=8080

spring.mvc.hiddenmethod.filter.enabled=true
spring.thymeleaf.cache=false

# 请先在 MySQL 中手动创建 ai_prompt_template_platform 数据库，再填写账号密码。
spring.datasource.url=jdbc:mysql://localhost:3306/ai_prompt_template_platform?useUnicode=true&characterEncoding=utf8&serverTimezone=Asia/Shanghai&allowPublicKeyRetrieval=true&useSSL=false
spring.datasource.username=root
spring.datasource.password=
spring.datasource.driver-class-name=com.mysql.cj.jdbc.Driver

spring.sql.init.mode=always
spring.sql.init.schema-locations=classpath:sql/schema-mysql.sql
spring.sql.init.data-locations=classpath:sql/data-demo.sql

mybatis-plus.configuration.map-underscore-to-camel-case=true
mybatis-plus.type-aliases-package=com.course.promptplatform.entity
mybatis-plus.global-config.db-config.id-type=auto
mybatis-plus.mapper-locations=classpath*:/mapper/**/*.xml

logging.level.com.course.promptplatform=INFO
