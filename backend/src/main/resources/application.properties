spring.application.name=ai-prompt-template-platform

server.port=${SERVER_PORT:8080}

# MySQL configuration. Do not commit real passwords.
# Example:
#   set DB_USERNAME=root
#   set DB_PASSWORD=your_password
spring.datasource.url=${DB_URL:jdbc:mysql://localhost:3306/ai_prompt_template_platform?useUnicode=true&characterEncoding=utf8&serverTimezone=Asia/Shanghai&allowPublicKeyRetrieval=true&useSSL=false}
spring.datasource.username=${DB_USERNAME:root}
spring.datasource.password=${DB_PASSWORD:}
spring.datasource.driver-class-name=com.mysql.cj.jdbc.Driver

spring.sql.init.mode=${SQL_INIT_MODE:always}
spring.sql.init.schema-locations=classpath:sql/schema-mysql.sql
spring.sql.init.data-locations=classpath:sql/data-demo.sql

mybatis-plus.configuration.map-underscore-to-camel-case=true
mybatis-plus.type-aliases-package=com.course.promptplatform.entity
mybatis-plus.global-config.db-config.id-type=auto
mybatis-plus.mapper-locations=classpath*:/mapper/**/*.xml

logging.level.com.course.promptplatform=INFO
