<!doctype html>
<html lang="zh-CN">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>AI 提示词模板平台</title>
  <link rel="stylesheet" href="./styles.css">
</head>
<body>
  <main class="page">
    <header class="page-header">
      <div>
        <h1 id="viewTitle">登录 / 注册</h1>
        <p id="viewSubtitle">请先登录或注册，再进入系统。</p>
      </div>
      <div id="sessionPanel" class="session-panel"></div>
    </header>

    <section id="message" class="message" hidden></section>

    <section id="authView" class="auth-layout view active">
      <div class="auth-card">
        <div class="auth-tabs">
          <button class="auth-tab active" data-auth-tab="login" type="button">登录</button>
          <button class="auth-tab" data-auth-tab="register" type="button">注册</button>
        </div>

        <form id="loginForm" class="form-grid">
          <input name="account" placeholder="用户名 / 邮箱 / 手机号" autocomplete="username">
          <input name="password" type="password" placeholder="密码" autocomplete="current-password">
          <button class="action-btn" type="submit">登录</button>
        </form>

        <form id="registerForm" class="form-grid" hidden>
          <input name="username" placeholder="用户名">
          <input name="password" type="password" placeholder="密码">
          <input name="phone" placeholder="手机号（可选）">
          <input name="email" type="email" placeholder="邮箱（可选）">
          <button class="action-btn" type="submit">注册并登录</button>
        </form>
      </div>
    </section>

    <section id="appShell" hidden>
      <nav id="navBar" class="nav-bar"></nav>

      <section id="marketView" class="view">
        <form id="searchForm" class="toolbar">
          <input name="keyword" placeholder="搜索标题、场景或提示词内容">
          <select name="tag" id="tagSelect">
            <option value="">全部标签</option>
          </select>
          <select name="sort">
            <option value="hot">按热度</option>
            <option value="score">按评分</option>
            <option value="latest">按最新</option>
          </select>
          <input name="minScore" type="number" min="0" max="5" step="0.1" placeholder="最低评分">
          <button type="submit">查询</button>
        </form>

        <section class="table-panel">
          <div class="section-head">
            <h2>模板列表</h2>
            <span class="muted">点击模板行查看详情</span>
          </div>
          <div id="templateList" class="template-list"></div>
          <div id="pagination" class="pagination"></div>
        </section>
      </section>

      <section id="profileView" class="view">
        <div id="profilePanel" class="stack-panel"></div>
      </section>

      <section id="useView" class="view">
        <div id="usePanel" class="stack-panel"></div>
      </section>

      <section id="creatorView" class="view">
        <div id="creatorPanel" class="stack-panel"></div>
      </section>

      <section id="platformView" class="view">
        <div id="platformPanel" class="stack-panel"></div>
      </section>
    </section>
  </main>

  <div id="templateModal" class="modal" hidden>
    <div class="modal-mask" data-close-modal></div>
    <section class="modal-panel" role="dialog" aria-modal="true" aria-labelledby="modalTitle">
      <header class="modal-header">
        <h2 id="modalTitle">模板详情</h2>
        <button id="closeModalBtn" class="icon-btn" type="button" aria-label="关闭">关闭</button>
      </header>
      <div id="modalBody" class="modal-body"></div>
    </section>
  </div>

  <script src="./app.js"></script>
</body>
</html>
